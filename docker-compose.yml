services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/mina_agent.db
    volumes:
      - db-data:/app/data
      # Mount Claude auth for CLI access — set CLAUDE_AUTH_DIR in shell or use default
      - ${CLAUDE_AUTH_DIR:-/home/ohsy/.claude}:/root/.claude:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  db-data:
